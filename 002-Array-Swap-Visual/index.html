<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Swap Diagram</title>
    <link rel="stylesheet"  href="style.css">
</head>
<body>
    <!-- ID's are used when there is just a single element -->
    <div id="container">
        <h1>Array in C++</h1>
        <!-- Making the skeleton that will add more values from js -->
        <div id="array-container" class="array-container"></div>

        <!-- Practice w/ using buttons -->
        <div class="controls">
            <button id="swap-btn">Swap Values</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>
    <!-- Classes are used when there's a multitude of them -->
    <script src="script.js"></script>
</body>
</html>
